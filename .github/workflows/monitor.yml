name: Vacancy Monitor

on:
  schedule:
    # Every 3 min, 08:30–19:30 Kyiv (06:30–17:30 UTC)
    - cron: "30 6 * * *"
    - cron: "*/3 7-16 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run vacancy checker
        id: run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python check_vacancies.py
          echo "changed=$(git diff --quiet .known_urls 2>/dev/null && echo 'false' || echo 'true')" >> $GITHUB_OUTPUT

      - name: Commit updated known URLs
        if: steps.run.outputs.changed == 'true'
        run: |
          git config user.name "vacancy-bot"
          git config user.email "vacancy-bot@users.noreply.github.com"
          git add .known_urls
          git commit -m "update known vacancies [skip ci]"
          git push

  daily_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check
    if: github.event_name == 'schedule' && github.event.schedule == '30 17 * * *'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Send daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_vacancies.py --daily-summary
