name: Vacancy Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run vacancy checker
        id: run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python check_vacancies.py
          echo "changed=$(git diff --quiet .known_urls 2>/dev/null && echo 'false' || echo 'true')" >> $GITHUB_OUTPUT

      - name: Commit updated known URLs
        if: steps.run.outputs.changed == 'true'
        run: |
          git config user.name "vacancy-bot"
          git config user.email "vacancy-bot@users.noreply.github.com"
          git add .known_urls
          git commit -m "update known vacancies [skip ci]"
          git push

  daily_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check if daily summary time
        id: time_check
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # 17:30 UTC = 20:30 Kyiv (after 19:30 last vacancy check)
          if [ "$HOUR" -ge 17 ] && [ "$MINUTE" -ge 25 ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
          else
            echo "should_send=false" >> $GITHUB_OUTPUT
          fi

      - name: Send daily summary
        if: steps.time_check.outputs.should_send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_vacancies.py --daily-summary
