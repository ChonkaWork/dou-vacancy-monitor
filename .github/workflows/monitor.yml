name: Vacancy Monitor

on:
  schedule:
    # 08:30–19:30 Kyiv (UTC+2) = 06:30–17:30 UTC, every 3 minutes
    - cron: "30 6 * * *"
    - cron: "*/3 7-16 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run vacancy checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_vacancies.py

      - name: Commit updated known URLs
        run: |
          git config user.name "vacancy-bot"
          git config user.email "vacancy-bot@users.noreply.github.com"
          git add .known_urls
          git diff --cached --quiet || git commit -m "update known vacancies [skip ci]"
          git push
